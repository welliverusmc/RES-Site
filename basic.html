<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RES Commission Calculator</title>
<style>
:root{
  --navy:#143d73;
  --blue:#1f5fa8;
  --bg:#f2f4f7;
  --muted:#5f6773;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--bg);
  padding-bottom:260px;
  color:#111827;
}
header{
  background:var(--navy);
  color:white;
  text-align:center;
  padding:24px 12px;
}
h1{margin:0;font-size:24px}
h2{margin:8px 0 0;font-size:20px}
.section{
  background:var(--navy);
  color:white;
  text-align:center;
  padding:12px;
  margin-top:16px;
  font-size:22px;
  font-weight:bold;
}
.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  margin:10px 12px;
  padding:14px;
  border-radius:12px;
  box-shadow:0 2px 7px rgba(0,0,0,.14);
}
.name{font-size:20px;font-weight:bold}
.pay{font-size:16px;color:var(--muted);margin-top:4px}
.controls{display:flex;align-items:center;gap:12px}
.qty{
  min-width:26px;
  text-align:center;
  font-size:21px;
  font-weight:bold;
}
button{
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.qty-btn{
  width:48px;
  height:48px;
  background:var(--blue);
  font-size:25px;
}
.footer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:white;
  border-top:1px solid #cfd3da;
  padding:12px;
  text-align:center;
  box-shadow:0 -2px 10px rgba(0,0,0,.16);
}
.footer h2{margin:8px 0;color:var(--navy)}
.footer-actions{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:8px;
}
.clear,.calculate{
  width:auto;
  height:auto;
  padding:12px 22px;
  font-size:18px;
}
.clear{background:#667085}
.calculate{background:var(--blue)}
.summary{
  max-height:115px;
  overflow:auto;
  border:1px solid #edf0f5;
  border-radius:10px;
  background:#fbfcfe;
  padding:10px;
  text-align:left;
}
.summary-title{
  font-weight:bold;
  color:var(--navy);
  margin-bottom:6px;
  text-align:center;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:4px 0;
  font-size:15px;
  color:#303846;
  border-bottom:1px solid #edf0f5;
}
.summary-row:last-child{border-bottom:none}
.summary-empty{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  padding:4px 0;
}
@media(max-width:480px){
  body{padding-bottom:275px}
  .card{padding:12px}
  .name{font-size:18px}
  .qty-btn{width:44px;height:44px}
  .clear,.calculate{font-size:16px;padding:11px 16px}
}
</style>
</head>
<body>
<header>
  <h1>Avenir Consulting Solutions</h1>
  <h2>RES Commission Calculator</h2>
</header>
<main id="app"></main>
<div class="footer">
  <div class="summary">
    <div class="summary-title">Sale Summary</div>
    <div id="itemizedList" class="summary-empty">No items selected.</div>
  </div>
  <div class="footer-actions">
    <button class="calculate" onclick="calculateTotal()">Calculate Total</button>
    <button class="clear" onclick="clearAll()">Clear All</button>
  </div>
  <h2>Total Commission: <span id="total">$0.00</span></h2>
</div>
<script>
const categories = {
  "Phone Lines": [
    ["New Line", 120],
    ["BYOD", 55],
    ["Upgrade", 20],
    ["Premium", 11],
    ["Extra", 8],
    ["Next Up", 8],
    ["AutoPay", 5],
    ["Single Insurance", 6],
    ["Family Insurance", 20]
  ],
  "Device Lines": [
    ["Tablet", 15],
    ["Watch", 15]
  ],
  "Other Services": [
    ["Internet Air", 100],
    ["DirecTV", 100]
  ]
};

let counts = {};
const app = document.getElementById("app");

function idFor(name){
  return name.replace(/[^a-zA-Z0-9]/g, "_");
}

Object.entries(categories).forEach(([category, items]) => {
  const title = document.createElement("div");
  title.className = "section";
  title.textContent = category;
  app.appendChild(title);

  items.forEach(([name, pay]) => {
    counts[name] = 0;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div>
        <div class="name">${name}</div>
        <div class="pay">$${pay} per item</div>
      </div>
      <div class="controls">
        <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
        <span class="qty" id="${idFor(name)}">0</span>
        <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
      </div>
    `;
    app.appendChild(card);
  });
});

function changeQty(name, amount){
  counts[name] = Math.max(0, counts[name] + amount);
  document.getElementById(idFor(name)).textContent = counts[name];
  updateSaleSummary();
}

function updateSaleSummary(){
  const rows = [];
  Object.values(categories).flat().forEach(([name, pay]) => {
    const qty = counts[name];
    if(qty > 0){
      const lineTotal = qty * pay;
      rows.push(`
        <div class="summary-row">
          <span>${name} × ${qty}</span>
          <strong>$${lineTotal.toFixed(2)}</strong>
        </div>
      `);
    }
  });
  const list = document.getElementById("itemizedList");
  list.className = rows.length ? "" : "summary-empty";
  list.innerHTML = rows.length ? rows.join("") : "No items selected.";
}

function calculateTotal(){
  let total = 0;
  Object.values(categories).flat().forEach(([name, pay]) => {
    total += counts[name] * pay;
  });
  document.getElementById("total").textContent = "$" + total.toFixed(2);
}

function clearAll(){
  Object.keys(counts).forEach(name => {
    counts[name] = 0;
    document.getElementById(idFor(name)).textContent = "0";
  });
  document.getElementById("total").textContent = "$0.00";
  updateSaleSummary();
}

updateSaleSummary();
</script>
</body>
</html>
